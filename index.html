<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Properties</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>

<style>
body { font-family: Inter, sans-serif; }
.icard { transition: all .4s ease; }
.icard:hover { transform: translateY(-6px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
@keyframes fadeUp {
  from { opacity:0; transform: translateY(20px);}
  to { opacity:1; transform: translateY(0);}
}
.card-enter { animation: fadeUp .6s ease both; }
.mqt { animation: marquee 25s linear infinite; }
@keyframes marquee {
  from { transform: translateX(0);}
  to { transform: translateX(-50%);}
}
</style>
</head>

<body class="bg-white text-neutral-800">

<!-- LOADER -->
<div id="loadingSkeleton" class="fixed inset-0 bg-white flex items-center justify-center z-50">
  <div class="animate-spin w-10 h-10 border-4 border-black border-t-transparent rounded-full"></div>
</div>

<!-- NAV -->
<nav class="p-4 border-b flex justify-between">
  <h1 class="font-semibold">Elite Properties</h1>
  <button id="filterBtn" class="text-sm bg-black text-white px-4 py-2 rounded">Search</button>
</nav>

<!-- MARQUEE -->
<section class="border-b py-3 overflow-hidden">
  <div class="mqt flex gap-10 whitespace-nowrap">
    <span>✔ Verified Properties</span>
    <span>✔ No Hidden Charges</span>
    <span>✔ Legal Support</span>
    <span>✔ 500+ Families</span>

    <span>✔ Verified Properties</span>
    <span>✔ No Hidden Charges</span>
    <span>✔ Legal Support</span>
    <span>✔ 500+ Families</span>
  </div>
</section>

<!-- FILTERS -->
<div class="p-6 grid grid-cols-2 md:grid-cols-4 gap-4">
  <select id="filterLocation" class="border p-2 rounded">
    <option value="">Location</option>
    <option>Whitefield</option>
    <option>HSR Layout</option>
  </select>

  <select id="filterType" class="border p-2 rounded">
    <option value="">Type</option>
    <option>Apartment</option>
    <option>Villa</option>
  </select>

  <select id="filterBhk" class="border p-2 rounded">
    <option value="">BHK</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <button id="clearFilters" class="border p-2 rounded">Clear</button>
</div>

<!-- PROPERTIES -->
<div class="p-6 grid md:grid-cols-3 gap-6" id="propertyGrid"></div>

<div id="noResults" class="hidden text-center p-10">
  No properties found
</div>

<!-- SCRIPT -->
<script>
const PROPS = [
  { title: "3BHK Apartment", price: "₹1.15 Cr", location: "Whitefield", type: "Apartment", bhk: 3, image: "https://images.unsplash.com/photo-1564013799919-ab600027ffc6" },
  { title: "Luxury Villa", price: "₹2.1 Cr", location: "Whitefield", type: "Villa", bhk: 4, image: "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9" },
  { title: "2BHK Flat", price: "₹72L", location: "HSR Layout", type: "Apartment", bhk: 2, image: "https://images.unsplash.com/photo-1574362848149-11496d93a7c7" }
];

const grid = document.getElementById("propertyGrid");
const noResults = document.getElementById("noResults");

function render(list) {
  if (!list.length) {
    noResults.classList.remove("hidden");
    grid.innerHTML = "";
    return;
  }
  noResults.classList.add("hidden");

  grid.innerHTML = list.map((p,i)=>`
    <div class="icard border rounded-xl overflow-hidden card-enter" style="animation-delay:${i*100}ms">
      <img src="${p.image}" class="h-48 w-full object-cover"/>
      <div class="p-4">
        <div class="flex justify-between">
          <h3>${p.title}</h3>
          <span>${p.price}</span>
        </div>
        <p class="text-sm text-gray-500">${p.location}</p>
      </div>
    </div>
  `).join("");
}

render(PROPS);

document.getElementById("filterBtn").onclick = () => {
  const loc = document.getElementById("filterLocation").value;
  const type = document.getElementById("filterType").value;
  const bhk = parseInt(document.getElementById("filterBhk").value) || 0;

  const filtered = PROPS.filter(p =>
    (!loc || p.location.includes(loc)) &&
    (!type || p.type === type) &&
    (!bhk || p.bhk === bhk)
  );

  render(filtered);
};

document.getElementById("clearFilters").onclick = () => {
  document.querySelectorAll("select").forEach(s => s.value = "");
  render(PROPS);
};

/* LOADER FIX */
window.onload = () => {
  const loader = document.getElementById("loadingSkeleton");
  loader.style.opacity = "0";
  setTimeout(()=> loader.remove(), 500);
};
</script>

</body>
</html>
